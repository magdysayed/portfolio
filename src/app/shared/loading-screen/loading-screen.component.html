@if (visible()) {
  <div class="loader" role="status" aria-live="polite" aria-label="Loading">
    <div class="loader__bg" aria-hidden="true"></div>
    <div class="loader__card card">
      <div class="spinner" aria-hidden="true"></div>
      <div class="loader__text">
        <div class="loader__title">Loading</div>
        <div class="loader__sub">Preparing the experience…</div>
      </div>
    </div>
  </div>
}
