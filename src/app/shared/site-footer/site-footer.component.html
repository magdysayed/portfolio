<footer class="footer">
  <div class="container footer__inner">
    <div class="footer__left">
      <div class="footer__brand">
        <span class="dot" aria-hidden="true"></span>
        <span class="name">{{ profile.name }}</span>
      </div>
      <div class="copy">Copyright © {{ year }} {{ profile.name }}</div>
    </div>

    <nav class="footer__nav" aria-label="Footer navigation">
      <button type="button" (click)="scrollTo('about')">About</button>
      <button type="button" (click)="scrollTo('skills')">Skills</button>
      <button type="button" (click)="scrollTo('projects')">Projects</button>
      <button type="button" (click)="scrollTo('contact')">Contact</button>
    </nav>

    <div class="footer__right">
      <div class="footer__social">
        <a [href]="profile.github" target="_blank" rel="noopener">GitHub</a>
        <a [href]="profile.linkedin" target="_blank" rel="noopener">LinkedIn</a>
        <a [href]="'mailto:' + profile.email">Email</a>
      </div>
      <button class="top" type="button" (click)="scrollTop()">Back to top ↑</button>
    </div>
  </div>
</footer>
